services:
  - type: web
    name: kidtracker
    env: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: node dist/index.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GITHUB_CALLBACK_URL
        sync: false
    healthCheckPath: /
    plan: free
    autoDeploy: true 